<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos Natura 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF6F0;
    --warm-white: #FDF9F4;
    --terra: #C4622D;
    --terra-light: #E8A080;
    --terra-pale: #F5E8E0;
    --green: #3D6B4F;
    --green-light: #7BA68A;
    --green-pale: #E8F0EB;
    --brown: #6B4C35;
    --text: #2C1F14;
    --text-muted: #8B7355;
    --border: #E8DDD0;
    --shadow: rgba(100, 60, 20, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--green);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.15);
  }
  .header-icon { font-size: 28px; }
  .header-title { font-family: 'Playfair Display', serif; color: white; font-size: 20px; font-weight: 600; }
  .header-sub { color: rgba(255,255,255,0.7); font-size: 13px; margin-top: 1px; }

  /* TABS */
  .tabs {
    display: flex;
    background: white;
    border-bottom: 2px solid var(--border);
    padding: 0 20px;
    gap: 4px;
  }
  .tab {
    padding: 14px 20px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .tab:hover { color: var(--green); }
  .tab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 600; }
  .tab-badge {
    background: var(--terra);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    min-width: 20px;
    text-align: center;
  }

  /* PANELS */
  .panel { display: none; padding: 24px 20px; max-width: 680px; margin: 0 auto; }
  .panel.active { display: block; }

  /* CARD */
  .card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 16px var(--shadow);
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: var(--brown);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* FORM */
  .form-group { margin-bottom: 18px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 6px;
  }
  .required::after { content: ' *'; color: var(--terra); }

  input, select, textarea {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--warm-white);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--green-light);
    box-shadow: 0 0 0 3px rgba(123, 166, 138, 0.15);
    background: white;
  }
  textarea { resize: vertical; min-height: 80px; }

  /* AUTOCOMPLETE */
  .autocomplete-wrap { position: relative; }
  .autocomplete-list {
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: white;
    border: 1.5px solid var(--green-light);
    border-top: none;
    border-radius: 0 0 10px 10px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 50;
    box-shadow: 0 8px 24px var(--shadow);
    display: none;
  }
  .autocomplete-list.open { display: block; }
  .autocomplete-item {
    padding: 10px 14px;
    font-size: 13.5px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid var(--border);
  }
  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover, .autocomplete-item.selected { background: var(--green-pale); color: var(--green); }
  .autocomplete-item mark { background: none; color: var(--terra); font-weight: 700; }

  /* CHIPS (multiple items) */
  .items-list { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; }
  .item-chip {
    background: var(--terra-pale);
    border: 1.5px solid var(--terra-light);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13.5px;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .item-chip-name { font-weight: 500; color: var(--brown); flex: 1; }
  .item-chip-price { font-weight: 700; color: var(--terra); margin: 0 12px; font-size: 14px; }
  .item-chip-remove {
    background: none; border: none; cursor: pointer;
    color: var(--terra-light); font-size: 18px; line-height: 1;
    width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
    border-radius: 50%; transition: background 0.15s;
  }
  .item-chip-remove:hover { background: rgba(196,98,45,0.15); color: var(--terra); }

  /* ADD ITEM ROW */
  .add-item-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    align-items: end;
  }
  .price-input-wrap { position: relative; }
  .price-input-wrap::before {
    content: '$';
    position: absolute;
    left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-weight: 600; font-size: 14px;
    pointer-events: none;
  }
  .price-input-wrap input { padding-left: 24px; }

  .btn-add {
    background: var(--green);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 11px 16px;
    font-size: 20px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    height: 44px; width: 44px;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-add:hover { background: var(--brown); transform: scale(1.05); }
  .btn-add:disabled { background: var(--border); cursor: not-allowed; transform: none; }

  /* TOTAL */
  .total-row {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--green-pale);
    border-radius: 10px;
    padding: 12px 16px;
    margin-top: 14px;
    border: 1.5px solid var(--green-light);
  }
  .total-label { font-weight: 600; color: var(--green); font-size: 14px; }
  .total-amount { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--green); }

  /* STATUS SELECTOR */
  .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .status-option { display: none; }
  .status-label {
    display: flex; align-items: center; gap: 9px;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    font-size: 13.5px;
    transition: all 0.18s;
    background: var(--warm-white);
  }
  .status-option:checked + .status-label {
    border-color: var(--green);
    background: var(--green-pale);
    color: var(--green);
    font-weight: 600;
  }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* SUBMIT BUTTON */
  .btn-submit {
    width: 100%;
    background: linear-gradient(135deg, var(--green) 0%, var(--brown) 100%);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    letter-spacing: 0.3px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-submit:hover { opacity: 0.92; transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }

  /* SUCCESS TOAST */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: white;
    padding: 14px 24px;
    border-radius: 12px;
    font-size: 14px; font-weight: 600;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 200;
    display: flex; align-items: center; gap: 10px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* PEDIDOS LIST */
  .pedido-card {
    background: white;
    border-radius: 14px;
    padding: 18px;
    border: 1.5px solid var(--border);
    box-shadow: 0 2px 10px var(--shadow);
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  .pedido-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--green);
  }
  .pedido-card.pendiente::before { background: var(--terra); }
  .pedido-card.cancelado::before { background: #999; }

  .pedido-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .pedido-cliente { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; color: var(--brown); }
  .pedido-fecha { font-size: 11px; color: var(--text-muted); }
  .pedido-total-big { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--green); }
  .pedido-items { font-size: 12.5px; color: var(--text-muted); margin-top: 6px; line-height: 1.6; }
  .pedido-badges { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .badge {
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }
  .badge-ok { background: var(--green-pale); color: var(--green); }
  .badge-pendiente { background: var(--terra-pale); color: var(--terra); }
  .badge-pago { background: #E8F5E9; color: #2E7D32; }
  .badge-deuda { background: #FFF3E0; color: #E65100; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 52px; margin-bottom: 14px; }
  .empty h3 { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--brown); margin-bottom: 8px; }
  .empty p { font-size: 13.5px; }

  /* EXPORT */
  .btn-export {
    background: var(--terra);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 11px 20px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 20px;
    transition: background 0.2s;
  }
  .btn-export:hover { background: var(--brown); }

  /* SCROLLBAR */
  .autocomplete-list::-webkit-scrollbar { width: 6px; }
  .autocomplete-list::-webkit-scrollbar-track { background: transparent; }
  .autocomplete-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 480px) {
    .form-row { grid-template-columns: 1fr; }
    .add-item-row { grid-template-columns: 1fr auto; }
    .add-item-row .price-input-wrap { grid-column: 1; }
    .status-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-icon">🌿</div>
  <div>
    <div class="header-title">Natura — Pedidos</div>
    <div class="header-sub">Cargá pedidos fácil y rápido</div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('nuevo')">✏️ Nuevo pedido</div>
  <div class="tab" onclick="switchTab('historial')">📋 Historial <span class="tab-badge" id="badge">0</span></div>
</div>

<!-- ─── TAB NUEVO ─── -->
<div class="panel active" id="tab-nuevo">

  <div class="card">
    <div class="card-title">👤 Datos de la clienta</div>

    <div class="form-group">
      <label class="required">Nombre de la clienta</label>
      <div class="autocomplete-wrap">
        <input type="text" id="cliente-input" placeholder="Escribí para buscar o ingresá un nombre nuevo..." autocomplete="off">
        <div class="autocomplete-list" id="cliente-list"></div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Mes del pedido</label>
        <select id="mes-select">
          <option value="">— Seleccioná —</option>
          <option>Enero</option><option>Febrero</option><option>Marzo</option>
          <option>Abril</option><option>Mayo</option><option>Junio</option>
          <option>Julio</option><option>Agosto</option><option>Septiembre</option>
          <option>Octubre</option><option>Noviembre</option><option>Diciembre</option>
        </select>
      </div>
      <div class="form-group">
        <label>Código (opcional)</label>
        <input type="text" id="codigo-input" placeholder="Ej: 204040">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🛍️ Productos</div>

    <div class="add-item-row">
      <div class="form-group" style="margin:0">
        <label class="required">Producto</label>
        <div class="autocomplete-wrap">
          <input type="text" id="producto-input" placeholder="Buscá o escribí el producto..." autocomplete="off">
          <div class="autocomplete-list" id="producto-list"></div>
        </div>
      </div>
      <div class="form-group price-input-wrap" style="margin:0; min-width:110px">
        <label class="required">Precio</label>
        <input type="number" id="precio-input" placeholder="0" min="0" step="100">
      </div>
      <div style="padding-bottom:0">
        <label style="visibility:hidden">add</label>
        <button class="btn-add" id="btn-add" onclick="addItem()" title="Agregar producto">+</button>
      </div>
    </div>

    <div id="items-list" class="items-list"></div>

    <div class="total-row" id="total-row" style="display:none">
      <span class="total-label">💰 Total del pedido</span>
      <span class="total-amount" id="total-display">$0</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📊 Estado del pedido</div>

    <div class="form-row" style="margin-bottom:16px">
      <div class="form-group">
        <label>Estado del pedido</label>
        <div class="status-grid">
          <div>
            <input type="radio" name="status-pedido" id="s-ok" value="Ok" class="status-option" checked>
            <label for="s-ok" class="status-label">
              <span class="status-dot" style="background:var(--green)"></span> ✅ Ok
            </label>
          </div>
          <div>
            <input type="radio" name="status-pedido" id="s-pendiente" value="Pendiente" class="status-option">
            <label for="s-pendiente" class="status-label">
              <span class="status-dot" style="background:var(--terra)"></span> ⏳ Pendiente
            </label>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Estado de pago</label>
        <div class="status-grid">
          <div>
            <input type="radio" name="status-pago" id="p-pago" value="Pago" class="status-option" checked>
            <label for="p-pago" class="status-label">
              <span class="status-dot" style="background:#2E7D32"></span> 💚 Pago
            </label>
          </div>
          <div>
            <input type="radio" name="status-pago" id="p-deuda" value="Deuda" class="status-option">
            <label for="p-deuda" class="status-label">
              <span class="status-dot" style="background:#E65100"></span> 🔴 Deuda
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Notas adicionales</label>
      <textarea id="notas-input" placeholder="Observaciones, dirección de entrega, preferencias..."></textarea>
    </div>
  </div>

  <button class="btn-submit" onclick="guardarPedido()">
    <span>💾</span> Guardar pedido
  </button>
  <div style="height:30px"></div>
</div>

<!-- ─── TAB HISTORIAL ─── -->
<div class="panel" id="tab-historial">
  <button class="btn-export" onclick="exportarCSV()">📥 Exportar para Google Sheets (.csv)</button>
  <div id="historial-list"></div>
</div>

<div class="toast" id="toast">✅ Pedido guardado correctamente</div>

let items = [];
let pedidos = JSON.parse(localStorage.getItem('natura_pedidos') || '[]');

// ── AUTOCOMPLETE ──
function setupAutocomplete(inputId, listId, data) {
  const input = document.getElementById(inputId);
  const list = document.getElementById(listId);
  let selectedIdx = -1;

  function highlight(text, query) {
    if (!query) return text;
    const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    return text.replace(re, '<mark>$1</mark>');
  }

  function render(query) {
    const q = query.toLowerCase().trim();
    if (!q) { list.classList.remove('open'); return; }
    const matches = data.filter(d => d.toLowerCase().includes(q)).slice(0, 8);
    if (!matches.length) { list.classList.remove('open'); return; }
    list.innerHTML = matches.map((m, i) =>
      `<div class="autocomplete-item" data-val="${m}" onmousedown="pickAutocomplete('${inputId}','${listId}','${m.replace(/'/g,"\\'")}')">
        ${highlight(m, query)}
      </div>`
    ).join('');
    list.classList.add('open');
    selectedIdx = -1;
  }

  input.addEventListener('input', e => render(e.target.value));
  input.addEventListener('keydown', e => {
    const items = list.querySelectorAll('.autocomplete-item');
    if (e.key === 'ArrowDown') { selectedIdx = Math.min(selectedIdx+1, items.length-1); }
    else if (e.key === 'ArrowUp') { selectedIdx = Math.max(selectedIdx-1, 0); }
    else if (e.key === 'Enter' && selectedIdx >= 0) {
      e.preventDefault();
      input.value = items[selectedIdx].dataset.val;
      list.classList.remove('open');
      if (inputId === 'producto-input') document.getElementById('precio-input').focus();
      return;
    } else if (e.key === 'Escape') { list.classList.remove('open'); return; }
    items.forEach((el, i) => el.classList.toggle('selected', i === selectedIdx));
  });
  input.addEventListener('blur', () => setTimeout(() => list.classList.remove('open'), 150));
}

function pickAutocomplete(inputId, listId, val) {
  document.getElementById(inputId).value = val;
  document.getElementById(listId).classList.remove('open');
  if (inputId === 'producto-input') document.getElementById('precio-input').focus();
}

// ── ITEMS ──
function addItem() {
  const prod = document.getElementById('producto-input').value.trim();
  const precio = parseFloat(document.getElementById('precio-input').value);
  if (!prod) { shake('producto-input'); return; }
  if (!precio || precio <= 0) { shake('precio-input'); return; }

  items.push({ producto: prod, precio });
  document.getElementById('producto-input').value = '';
  document.getElementById('precio-input').value = '';
  document.getElementById('producto-input').focus();
  renderItems();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.id === 'precio-input') addItem();
});

function removeItem(idx) {
  items.splice(idx, 1);
  renderItems();
}

function renderItems() {
  const list = document.getElementById('items-list');
  const totalRow = document.getElementById('total-row');
  const total = items.reduce((s, i) => s + i.precio, 0);

  if (!items.length) { list.innerHTML = ''; totalRow.style.display = 'none'; return; }

  list.innerHTML = items.map((item, i) => `
    <div class="item-chip">
      <span class="item-chip-name">🌿 ${item.producto}</span>
      <span class="item-chip-price">$${item.precio.toLocaleString('es-AR')}</span>
      <button class="item-chip-remove" onclick="removeItem(${i})">×</button>
    </div>
  `).join('');

  document.getElementById('total-display').textContent = '$' + total.toLocaleString('es-AR');
  totalRow.style.display = 'flex';
}

function shake(id) {
  const el = document.getElementById(id);
  el.style.borderColor = 'var(--terra)';
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'shake 0.3s ease';
  setTimeout(() => { el.style.borderColor = ''; el.style.animation = ''; }, 600);
}

// ── SAVE ──
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbznc9JUOpW8QYuRxx7mrl5vK0pUPIuq1r8jLydb8i6sRNumN5x-mBkrH8VuVpqFAg8vFQ/exec';

async function guardarPedido() {
  const cliente = document.getElementById('cliente-input').value.trim();
  if (!cliente) { shake('cliente-input'); return; }
  if (!items.length) { alert('Agregá al menos un producto'); return; }

  const mes = document.getElementById('mes-select').value || getMesActual();
  const total = items.reduce((s, i) => s + i.precio, 0);
  const statusPedido = document.querySelector('input[name="status-pedido"]:checked').value;
  const statusPago = document.querySelector('input[name="status-pago"]:checked').value;
  const codigo = document.getElementById('codigo-input').value.trim();
  const notas = document.getElementById('notas-input').value.trim();

  const pedido = {
    id: Date.now(),
    fecha: new Date().toLocaleDateString('es-AR'),
    hora: new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }),
    mes,
    cliente,
    items: [...items],
    total,
    statusPedido,
    statusPago,
    codigo,
    notas
  };

  // Mostrar estado de carga
  const btn = document.querySelector('.btn-submit');
  btn.innerHTML = '<span>⏳</span> Guardando en Google Sheets...';
  btn.disabled = true;

  try {
    // Enviar datos via GET params (funciona desde archivo local sin CORS)
    const params = new URLSearchParams({
      action: 'guardar',
      payload: JSON.stringify(pedido)
    });
    await fetch(SCRIPT_URL + '?' + params.toString(), {
      method: 'GET',
      mode: 'no-cors'
    });
    // Esperar un momento para que el script procese
    await new Promise(r => setTimeout(r, 1500));

    // Guardar también localmente como respaldo
    pedidos.unshift(pedido);
    localStorage.setItem('natura_pedidos', JSON.stringify(pedidos));

    // Reset form
    items = [];
    document.getElementById('cliente-input').value = '';
    document.getElementById('producto-input').value = '';
    document.getElementById('precio-input').value = '';
    document.getElementById('codigo-input').value = '';
    document.getElementById('notas-input').value = '';
    document.getElementById('mes-select').value = '';
    renderItems();
    updateBadge();
    showToast('✅ Pedido de ' + cliente + ' guardado en Google Sheets!');

  } catch (err) {
    // Si falla la conexión, guardar localmente y avisar
    pedidos.unshift({ ...pedido, pendienteSync: true });
    localStorage.setItem('natura_pedidos', JSON.stringify(pedidos));
    showToast('⚠️ Sin internet — guardado localmente');
    items = [];
    renderItems();
    updateBadge();
  } finally {
    btn.innerHTML = '<span>💾</span> Guardar pedido';
    btn.disabled = false;
  }
}

function getMesActual() {
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return meses[new Date().getMonth()];
}

// ── HISTORIAL ──
function renderHistorial() {
  const container = document.getElementById('historial-list');
  if (!pedidos.length) {
    container.innerHTML = `<div class="empty">
      <div class="empty-icon">📋</div>
      <h3>No hay pedidos todavía</h3>
      <p>Los pedidos que cargues aparecerán acá</p>
    </div>`;
    return;
  }
  container.innerHTML = pedidos.map(p => `
    <div class="pedido-card ${p.statusPedido === 'Pendiente' ? 'pendiente' : ''}">
      <div class="pedido-header">
        <div>
          <div class="pedido-cliente">${p.cliente}</div>
          <div class="pedido-fecha">📅 ${p.fecha} · ${p.hora} · ${p.mes}</div>
        </div>
        <div class="pedido-total-big">$${p.total.toLocaleString('es-AR')}</div>
      </div>
      <div class="pedido-items">${p.items.map(i => `${i.producto} ($${i.precio.toLocaleString('es-AR')})`).join(' · ')}</div>
      ${p.notas ? `<div class="pedido-items" style="margin-top:4px;font-style:italic">💬 ${p.notas}</div>` : ''}
      <div class="pedido-badges">
        <span class="badge ${p.statusPedido === 'Ok' ? 'badge-ok' : 'badge-pendiente'}">${p.statusPedido === 'Ok' ? '✅ Ok' : '⏳ Pendiente'}</span>
        <span class="badge ${p.statusPago === 'Pago' ? 'badge-pago' : 'badge-deuda'}">${p.statusPago === 'Pago' ? '💚 Pago' : '🔴 Deuda'}</span>
        ${p.codigo ? `<span class="badge" style="background:#f0f0f0;color:#666">📦 ${p.codigo}</span>` : ''}
      </div>
    </div>
  `).join('');
}

// ── EXPORT CSV ──
function exportarCSV() {
  if (!pedidos.length) { alert('No hay pedidos para exportar'); return; }

  const rows = [['Marca temporal','Nombre clienta','Producto','Precio de venta','Codigo','Mes','Status Pedido','Estado de Pago','Notas']];
  pedidos.forEach(p => {
    p.items.forEach(item => {
      rows.push([
        `${p.fecha} ${p.hora}`,
        p.cliente,
        item.producto,
        item.precio,
        p.codigo || '',
        p.mes,
        p.statusPedido,
        p.statusPago,
        p.notas || ''
      ]);
    });
  });

  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `pedidos_natura_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── UTILS ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='nuevo'&&i===0)||(tab==='historial'&&i===1)));
  document.querySelectorAll('.panel').forEach((p,i) => p.classList.toggle('active', (tab==='nuevo'&&i===0)||(tab==='historial'&&i===1)));
  if (tab === 'historial') renderHistorial();
}

function updateBadge() {
  document.getElementById('badge').textContent = pedidos.length;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── CARGAR CLIENTAS DESDE GOOGLE SHEETS ──
async function cargarClientes() {
  const input = document.getElementById('cliente-input');
  input.placeholder = '⏳ Cargando clientas...';
  input.disabled = true;
  try {
    const res = await fetch(SCRIPT_URL + '?action=clientes');
    const data = await res.json();
    if (data.ok && data.clientes.length) {
      setupAutocomplete('cliente-input', 'cliente-list', data.clientes);
      input.placeholder = 'Escribí para buscar (' + data.clientes.length + ' clientas)...';
    } else { throw new Error('sin datos'); }
  } catch (e) {
    setupAutocomplete('cliente-input', 'cliente-list', CLIENTES);
    input.placeholder = 'Escribí para buscar (lista local)...';
  } finally {
    input.disabled = false;
  }
}

// ── INIT ──
cargarClientes();
setupAutocomplete('producto-input', 'producto-list', PRODUCTOS);
updateBadge();
renderHistorial();

// Auto-set mes actual
const mesActual = getMesActual();
const mesSelect = document.getElementById('mes-select');
for (let opt of mesSelect.options) { if (opt.value === mesActual) { opt.selected = true; break; } }
</script>
